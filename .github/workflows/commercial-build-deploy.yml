      - name: Report - Docker Build Status
        id: docker-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P7b - Docker Extended Build (${{ matrix.job.name }}): PASSED"
      
      - name: Complete - Docker Extended Build (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Docker extended build completed successfully"
          echo "=============================================="

  # ================================================================================
  # P8a - Docker Manifest (基础镜像)
  # ================================================================================
  # 功能: Docker多架构Manifest创建（基础镜像）
  # 输入: pre-build.git_tag
  # 输出: status
  # 执行条件: should_build_base_image == 'true' && docker-build-base.result == 'success'
  # 依赖: pre-build, docker-build-base
  # ================================================================================
  docker-manifest-base:
    name: P8a - Docker Manifest (Base)
    needs: 
      - pre-build
      - docker-build-base
    runs-on: ubuntu-latest
    if: ${{ needs.pre-build.outputs.should_build_base_image == 'true' && needs.docker-build-base.result != 'failure' && needs.docker-build-base.outputs.status == 'success' }}
    outputs:
      status: ${{ steps.manifest-status.outputs.status }}
    
    steps:
      - name: Start - Manifest Creation (Base)
        run: |
          echo "=============================================="
          echo "    Creating multi-arch Docker manifests (Base)"
          echo "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Set - Version Variables
        run: |
          echo "GIT_TAG=${{ needs.pre-build.outputs.git_tag }}" >> $GITHUB_ENV
          echo "DEBUG: GIT_TAG set to ${{ needs.pre-build.outputs.git_tag }}"
      
      - name: Login - Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: Login - GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: changsongyang
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create - Docker Hub Version Manifest (Base)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}
          extra-images: ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-amd64,${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-arm64v8,${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-armv7
          push: true
      
      - name: Create - Docker Hub Latest Manifest (Base)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}
          extra-images: ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-amd64,${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-arm64v8,${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-armv7
          push: true
      
      - name: Create - GHCR Version Manifest (Base)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}
          extra-images: ${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-amd64,${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-arm64v8,${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-armv7
          push: true
      
      - name: Create - GHCR Latest Manifest (Base)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}
          extra-images: ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-amd64,${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-arm64v8,${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-armv7
          push: true
      
      - name: Report - Manifest Status (Base)
        id: manifest-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P8a - Docker Manifest (Base): PASSED"

  # ================================================================================
  # P8b - Docker Manifest (拓展镜像)
  # ================================================================================
  # 功能: Docker多架构Manifest创建（拓展镜像）
  # 输入: pre-build.git_tag
  # 输出: status
  # 执行条件: should_build_extended_image == 'true' && docker-build-extended.result == 'success'
  # 依赖: pre-build, docker-build-extended
  # ================================================================================
  docker-manifest-extended:
    name: P8b - Docker Manifest (Extended)
    needs: 
      - pre-build
      - docker-build-extended
    runs-on: ubuntu-latest
    if: ${{ needs.pre-build.outputs.should_build_extended_image == 'true' && needs.docker-build-extended.result != 'failure' && needs.docker-build-extended.outputs.status == 'success' }}
    outputs:
      status: ${{ steps.manifest-status.outputs.status }}
    
    steps:
      - name: Start - Manifest Creation (Extended)
        run: |
          echo "=============================================="
          echo "    Creating multi-arch Docker manifests (Extended)"
          echo "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Set - Version Variables
        run: |
          echo "GIT_TAG=${{ needs.pre-build.outputs.git_tag }}" >> $GITHUB_ENV
          echo "DEBUG: GIT_TAG set to ${{ needs.pre-build.outputs.git_tag }}"
      
      - name: Login - Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: Login - GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: changsongyang
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create - Docker Hub Version Manifest (Extended)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended
          extra-images: ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended-amd64,${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended-arm64v8,${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended-armv7
          push: true
      
      - name: Create - Docker Hub Latest Manifest (Extended)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-extended
          extra-images: ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-extended-amd64,${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-extended-arm64v8,${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-extended-armv7
          push: true
      
      - name: Create - GHCR Version Manifest (Extended)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-extended
          extra-images: ${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-extended-amd64,${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-extended-arm64v8,${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-extended-armv7
          push: true
      
      - name: Create - GHCR Latest Manifest (Extended)
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-extended
          extra-images: ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-extended-amd64,${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-extended-arm64v8,${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-extended-armv7
          push: true
      
      - name: Report - Manifest Status (Extended)
        id: manifest-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P8b - Docker Manifest (Extended): PASSED"

  # ================================================================================
  # P9 - 部署汇总
  # ================================================================================
  # 功能: 部署结果汇总和审计记录
  # 输入: pre-build.git_tag, pre-build.build_id
  # 输出: 无
  # 执行条件: should_deploy == 'true' (always执行)
  # 依赖: pre-build, build-summary, deb-package, github-release, docker-manifest-*
  # ================================================================================
  deploy-summary:
    name: P9 - Deployment Summary
    needs: 
      - pre-build
      - build-summary
      - deb-package
    runs-on: ubuntu-22.04
    if: ${{ needs.build-summary.outputs.has_artifacts == 'true' }}
    continue-on-error: true
    
    steps:
      - name: Display - Deployment Summary
        run: |
          echo "=============================================="
          echo "           BUILD PIPELINE SUMMARY              "
          echo "=============================================="
          echo "Build ID:      ${{ needs.pre-build.outputs.build_id }}"
          echo "Version:       ${{ needs.pre-build.outputs.git_tag }}"
          echo "Build Type:    ${{ needs.pre-build.outputs.build_type }}"
          echo "Environment:   ${{ needs.pre-build.outputs.should_deploy == 'true' && 'Production' || 'Development' }}"
          echo "----------------------------------------------"
          echo "AUDIT INFORMATION:"
          echo "   Triggered by:   ${{ github.actor }}"
          echo "   Event Type:     ${{ github.event_name }}"
          echo "   Trigger Time:   ${{ github.event.created_at || github.event.head_commit.timestamp || 'N/A' }}"
          echo "   Git Ref:        ${{ github.ref }}"
          echo "   Git SHA:        ${{ github.sha }}"
          echo "----------------------------------------------"
          echo "[PASS] Build Summary: Completed"
          echo "[PASS] Debian Package: Completed"
          echo "[PASS] GitHub Release: Completed"
          echo "----------------------------------------------"
          echo "Docker Base Images:"
          echo "  - ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}"
          echo "  - ${{ env.DOCKERHUB_IMAGE }}:latest"
          echo "  - ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}"
          echo "  - ${{ env.GHCR_IMAGE }}:latest"
          echo "Docker Extended Images:"
          echo "  - ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-extended"
          echo "  - ${{ env.DOCKERHUB_IMAGE }}:extended-latest"
          echo "  - ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-extended"
          echo "  - ${{ env.GHCR_IMAGE }}:extended-latest"
          echo "=============================================="
          echo "${{ needs.pre-build.outputs.should_deploy == 'true' && 'Deployment completed successfully!' || 'Build pipeline completed successfully!' }}"