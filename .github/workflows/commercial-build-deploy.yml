name: Commercial Build & Deploy

# RustDesk Pro Server Commercial Edition CI/CD Workflow
# 优化目标：
# 1. 结构化顺序：构建阶段 → 部署阶段
# 2. 并行执行：Linux 多架构并行构建
# 3. 依赖管理：严格的阶段依赖关系
# 4. 错误处理：构建失败时阻止部署
# 5. 进度跟踪：每个阶段的状态报告

permissions:
  contents: write
  packages: write
  id-token: write

on:
  push:
    branches: [main]
    tags:
      - 'pro-v*'
      - 'pro-*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g., pro-v1.0.0)'
        required: false
        type: string
      skip-deploy:
        description: '跳过部署阶段'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  GHCR_IMAGE: ghcr.io/changsongyang/rustdesk-pro-server
  DOCKERHUB_IMAGE: ycstech/rustdesk-pro-server
  LATEST_TAG: latest

jobs:
  # ==================== 阶段 1: 构建准备 ====================
  pre-build:
    name: 📋 Pre-Build Preparation
    runs-on: ubuntu-22.04
    outputs:
      build_id: ${{ steps.build-id.outputs.build_id }}
      git_tag: ${{ steps.vars.outputs.git_tag }}
      deb_version: ${{ steps.vars.outputs.deb_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: 📝 Generate Build ID
        id: build-id
        run: |
          BUILD_ID=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
      
      - name: 📌 Extract version information
        id: vars
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            T=${{ github.event.inputs.version }}
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            T=${GITHUB_REF#refs/tags/}
          else
            T="dev-${GITHUB_SHA::8}"
          fi
          echo "git_tag=$T" >> $GITHUB_OUTPUT
          echo "GIT_TAG=$T" >> $GITHUB_ENV
          
          VERSION=${T#pro-v}
          VERSION=${VERSION#pro-}
          VERSION=${VERSION#v}
          echo "deb_version=$VERSION" >> $GITHUB_OUTPUT
          echo "DEB_VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: 📊 Build Information
        run: |
          echo "=============================================="
          echo "         Build Configuration Summary          "
          echo "=============================================="
          echo "Build ID:      $BUILD_ID"
          echo "Git Tag:       $GIT_TAG"
          echo "Deb Version:   $DEB_VERSION"
          echo "Trigger:       ${{ github.event_name }}"
          echo "Ref:           ${{ github.ref }}"
          echo "=============================================="

  # ==================== 阶段 2: 并行构建 ====================
  build-linux:
    name: 🔧 Build Linux - ${{ matrix.job.name }}
    needs: pre-build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64",   target: "x86_64-unknown-linux-musl" }
          - { name: "arm64v8", target: "aarch64-unknown-linux-musl" }
          - { name: "armv7",   target: "armv7-unknown-linux-musleabihf" }
    
    steps:
      - name: 🚀 Start Build - ${{ matrix.job.name }}
        run: |
          echo "=============================================="
          echo "  Starting ${{ matrix.job.name }} build process"
          echo "  Target: ${{ matrix.job.target }}"
          echo "=============================================="
      
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: ${{ matrix.job.target }}
      
      - name: Install cross tool
        run: cargo install cross --git https://github.com/rust-embedded/cross
      
      - name: Install OpenSSL for musl targets
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.job.target }}
      
      - name: 🔨 Compile
        run: |
          rm -f commercial/Cargo.lock
          cross build --manifest-path commercial/Cargo.toml --release --target=${{ matrix.job.target }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          OPENSSL_DIR: /usr
          OPENSSL_STATIC: 1
      
      - name: ✅ Verify build
        run: |
          if [ ! -f commercial/target/${{ matrix.job.target }}/release/rustdesk-pro ]; then
            echo "❌ Build failed: binary not found"
            exit 1
          fi
          echo "✅ Build successful"
      
      - name: Exec chmod
        run: chmod -v a+x commercial/target/${{ matrix.job.target }}/release/*
      
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: |
            commercial/target/${{ matrix.job.target }}/release/rustdesk-pro
          if-no-files-found: error
      
      - name: 🎉 Build Complete - ${{ matrix.job.name }}
        run: |
          echo "=============================================="
          echo "  ${{ matrix.job.name }} build completed successfully"
          echo "  Binary: commercial/target/${{ matrix.job.target }}/release/rustdesk-pro"
          echo "=============================================="

  # Windows build (并行执行)
  build-windows:
    name: 🔧 Build Windows
    needs: pre-build
    runs-on: windows-2022
    
    steps:
      - name: 🚀 Start Windows Build
        run: |
          Write-Host "=============================================="
          Write-Host "  Starting Windows build process"
          Write-Host "=============================================="
      
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: 🔨 Compile
        run: cargo build --manifest-path commercial/Cargo.toml --release --target=x86_64-pc-windows-msvc
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
      
      - name: ✅ Verify build
        run: |
          if (-not (Test-Path "commercial\target\x86_64-pc-windows-msvc\release\rustdesk-pro.exe")) {
            Write-Error "❌ Build failed: binary not found"
            exit 1
          }
          Write-Host "✅ Build successful"
      
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: binaries-windows-x86_64
          path: |
            commercial\target\x86_64-pc-windows-msvc\release\rustdesk-pro.exe
          if-no-files-found: error
      
      - name: 🎉 Windows Build Complete
        run: |
          Write-Host "=============================================="
          Write-Host "  Windows build completed successfully"
          Write-Host "=============================================="

  # ==================== 阶段 3: 构建汇总与验证 ====================
  build-summary:
    name: 📊 Build Summary & Validation
    needs: 
      - build-linux
      - build-windows
    runs-on: ubuntu-22.04
    outputs:
      build_status: ${{ steps.status.outputs.build_status }}
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
      
      - name: ✅ Validate artifacts
        id: status
        run: |
          echo "=============================================="
          echo "        Build Artifact Validation             "
          echo "=============================================="
          
          STATUS="success"
          MISSING=""
          
          # Check Linux binaries
          for arch in amd64 arm64v8 armv7; do
            if [ -f "artifacts/binaries-linux-$arch/rustdesk-pro" ]; then
              echo "✅ binaries-linux-$arch: Found"
            else
              echo "❌ binaries-linux-$arch: MISSING"
              STATUS="failed"
              MISSING="$MISSING $arch"
            fi
          done
          
          # Check Windows binary
          if [ -f "artifacts/binaries-windows-x86_64/rustdesk-pro.exe" ]; then
            echo "✅ binaries-windows-x86_64: Found"
          else
            echo "❌ binaries-windows-x86_64: MISSING"
            STATUS="failed"
            MISSING="$MISSING windows"
          fi
          
          echo "----------------------------------------------"
          echo "Build Status: $STATUS"
          if [ "$MISSING" != "" ]; then
            echo "Missing artifacts: $MISSING"
          fi
          echo "=============================================="
          
          echo "build_status=$STATUS" >> $GITHUB_OUTPUT
      
      - name: ❌ Fail if any build failed
        if: steps.status.outputs.build_status == 'failed'
        run: |
          echo "Build validation failed - aborting workflow"
          exit 1

  # ==================== 阶段 4: 打包（Debian 包） ====================
  deb-package:
    name: 📦 Debian Package - ${{ matrix.job.name }}
    needs: build-summary
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/') && needs.build-summary.outputs.build_status == 'success'
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64",   debian_platform: "amd64",   crossbuild_package: "" }
          - { name: "arm64v8", debian_platform: "arm64",   crossbuild_package: "crossbuild-essential-arm64" }
          - { name: "armv7",   debian_platform: "armhf",   crossbuild_package: "crossbuild-essential-armhf" }
    
    steps:
      - name: 🚀 Start Debian Packaging
        run: |
          echo "=============================================="
          echo "  Starting Debian package build for ${{ matrix.job.name }}"
          echo "=============================================="
      
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: binaries
      
      - name: Make binaries executable
        run: chmod -v a+x binaries/*
      
      - name: Install dependencies
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -y debhelper fakeroot ${{ matrix.job.crossbuild_package }}
      
      - name: 📦 Build debian package
        env:
          CONTROL_FILE_CONTENT: |
            Package: rustdesk-pro-server
            Version: ${{ needs.pre-build.outputs.deb_version }}
            Section: net
            Priority: optional
            Architecture: ${{ matrix.job.debian_platform }}
            Maintainer: RustDesk Team <info@rustdesk.com>
            Description: RustDesk Pro Server - Enterprise Remote Control Solution
             RustDesk Pro Server is the commercial edition of RustDesk Server,
             providing enterprise-grade features including license management,
             user management, device management, and audit logging.
        run: |
          mkdir -p debian-package
          cp binaries/* debian-package/
          
          mkdir -p debian-package/DEBIAN
          # Write control file from environment variable
          printf '%s\n' "$CONTROL_FILE_CONTENT" > debian-package/DEBIAN/control
          
          fakeroot dpkg-deb --build debian-package rustdesk-pro-server-${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}.deb
      
      - name: ✅ Verify package
        run: |
          PACKAGE="rustdesk-pro-server-${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}.deb"
          if [ ! -f "$PACKAGE" ]; then
            echo "❌ Package not found: $PACKAGE"
            exit 1
          fi
          echo "✅ Package created: $PACKAGE"
      
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: debian-package-${{ matrix.job.name }}
          path: rustdesk-pro-server-${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}.deb
          if-no-files-found: error
      
      - name: 🎉 Debian Package Complete
        run: |
          echo "=============================================="
          echo "  Debian package build completed successfully"
          echo "=============================================="

  # ==================== 阶段 5: GitHub Release ====================
  github-release:
    name: 🚀 GitHub Release
    needs: 
      - build-summary
      - deb-package
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/') && needs.build-summary.outputs.build_status == 'success'
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
      
      - name: Install zip
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -y zip
      
      - name: 📦 Pack Linux binaries
        run: |
          mkdir -p release
          for arch in amd64 arm64v8 armv7; do
            cp artifacts/binaries-linux-$arch/rustdesk-pro release/rustdesk-pro-$arch
            chmod +x release/rustdesk-pro-$arch
            zip release/rustdesk-pro-server-linux-$arch.zip release/rustdesk-pro-$arch
          done
      
      - name: 📦 Pack Windows binaries
        run: |
          cp artifacts/binaries-windows-x86_64/rustdesk-pro.exe release/
          zip release/rustdesk-pro-server-windows-x86_64.zip release/rustdesk-pro.exe
      
      - name: 📦 Copy debian packages
        run: |
          cp artifacts/debian-package-*/rustdesk-pro-server-*.deb release/ 2>/dev/null || true
      
      - name: ✅ List release assets
        run: |
          echo "=============================================="
          echo "              Release Assets                  "
          echo "=============================================="
          ls -la release/
          echo "=============================================="
      
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/*.zip
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🎉 Release Complete
        run: |
          echo "=============================================="
          echo "         GitHub Release created successfully   "
          echo "=============================================="

  # ==================== 阶段 6: Docker 镜像构建与推送 ====================
  docker-build:
    name: 🐳 Docker Build - ${{ matrix.job.name }}
    needs: build-summary
    if: ${{ !github.event.inputs.skip-deploy && needs.build-summary.outputs.build_status == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64",   docker_platform: "linux/amd64" }
          - { name: "arm64v8", docker_platform: "linux/arm64" }
          - { name: "armv7",   docker_platform: "linux/arm/v7" }
    
    steps:
      - name: 🚀 Start Docker Build - ${{ matrix.job.name }}
        run: |
          echo "=============================================="
          echo "  Starting Docker build for ${{ matrix.job.name }}"
          echo "=============================================="
      
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: 📥 Download binaries
        uses: actions/download-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: artifacts
      
      - name: 📦 Prepare rootfs
        run: |
          mkdir -p commercial/docker/rootfs/usr/bin
          cp artifacts/rustdesk-pro commercial/docker/rootfs/usr/bin/
          chmod +x commercial/docker/rootfs/usr/bin/*
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./commercial/docker/Dockerfile.gha
          platforms: ${{ matrix.job.docker_platform }}
          push: true
          provenance: false
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-${{ matrix.job.name }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}
            ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-${{ matrix.job.name }}
            ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}
      
      - name: ✅ Verify push
        run: |
          echo "✅ Docker image pushed successfully"
          echo "Tags: ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}"
      
      - name: 🎉 Docker Build Complete
        run: |
          echo "=============================================="
          echo "  Docker build completed successfully"
          echo "=============================================="

  # ==================== 阶段 7: Docker Manifest ====================
  docker-manifest:
    name: 📦 Docker Manifest
    needs: docker-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !github.event.inputs.skip-deploy
    
    steps:
      - name: 🚀 Start Manifest Creation
        run: |
          echo "=============================================="
          echo "    Creating multi-arch Docker manifests      "
          echo "=============================================="
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: changsongyang
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📦 Docker Hub manifests
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}
          extra-images: ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-amd64,${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-arm64v8,${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-armv7
          push: true
      
      - name: 📦 Docker Hub latest manifest
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}
          extra-images: ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-amd64,${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-arm64v8,${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-armv7
          push: true
      
      - name: 📦 GHCR manifests
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}
          extra-images: ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-amd64,${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-arm64v8,${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-armv7
          push: true
      
      - name: 📦 GHCR latest manifest
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          base-image: ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}
          extra-images: ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-amd64,${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-arm64v8,${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-armv7
          push: true
      
      - name: 🎉 Manifest Creation Complete
        run: |
          echo "=============================================="
          echo "     Multi-arch manifests created successfully "
          echo "=============================================="

  # ==================== 阶段 8: 部署汇总 ====================
  deploy-summary:
    name: 📊 Deployment Summary
    needs: 
      - github-release
      - docker-manifest
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/') && !github.event.inputs.skip-deploy
    
    steps:
      - name: 📊 Deployment Summary
        run: |
          echo "=============================================="
          echo "           DEPLOYMENT SUMMARY                  "
          echo "=============================================="
          echo "Build ID:      ${{ needs.pre-build.outputs.build_id }}"
          echo "Version:       ${{ needs.pre-build.outputs.git_tag }}"
          echo "Environment:   Production"
          echo "----------------------------------------------"
          echo "✅ GitHub Release: Completed"
          echo "✅ Docker Hub:     Completed"
          echo "✅ GHCR:           Completed"
          echo "✅ Multi-arch:     Completed"
          echo "----------------------------------------------"
          echo "Docker Images:"
          echo "  - ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}"
          echo "  - ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}"
          echo "=============================================="
