name: Commercial Build & Deploy

# ================================================================================
# RustDesk Pro Server Commercial Edition CI/CD Workflow
# ================================================================================
#
# 优化目标:
# 1. 结构化顺序: 构建阶段 -> 部署阶段
# 2. 并行执行: Linux 多架构并行构建
# 3. 依赖管理: 严格的阶段依赖关系
# 4. 错误处理: 构建失败时阻止部署
# 5. 进度跟踪: 每个阶段的状态报告
#
# 任务优先级顺序:
#   P1 (准备)     - pre-build: 构建准备和版本信息
#   P2 (检查)     - code-quality: 代码质量检查(Rustfmt/Clippy)
#   P3 (构建)     - build-linux/build-windows: 并行构建(最多5个并行)
#   P4 (验证)     - build-summary: 构建结果验证
#   P5 (打包)     - deb-package: Debian 包构建
#   P6 (发布)     - github-release: GitHub Release 发布
#   P7 (部署)     - docker-build: Docker 镜像构建(最多5个并行)
#   P8 (汇总)     - docker-manifest: Docker Manifest 创建
#   P9 (总结)     - deploy-summary: 部署结果汇总
#
# 并行执行策略:
#   - build-linux: 最多5个架构并行(amd64, arm64v8, armv7)
#   - build-windows: 与 build-linux 并行执行
#   - docker-build: 最多5个架构并行
#
# 依赖关系链:
#   pre-build -> build-* -> build-summary -> deb-package -> github-release -> docker-build -> docker-manifest -> deploy-summary
#
# 失败阻断机制:
#   Build 失败 -> 阻断 deb-package, github-release, docker-build
#   build-summary 失败 -> 阻断所有 CD 任务
#
# 触发方式:
#   - 推送 pro-v* 或 pro-* tag 到 main 分支
#   - 手动 workflow_dispatch 触发
#
# ================================================================================

permissions:
  contents: write
  packages: write
  id-token: write

on:
  # ================================================================================
  # 自动触发器
  # ================================================================================
  
  # 分支推送触发（开发构建）
  push:
    branches:
      - 'main'
      - 'master'
      - 'develop'
      - 'development'
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'release/**'
      - 'dev/**'
      - 'wip/**'
    tags:
      # Tag 推送触发（生产构建）
      - 'pro-v*'
      - 'pro-*'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      # 触发类型（必填）
      trigger_type:
        description: '触发类型'
        required: true
        type: choice
        options:
          - branch_with_version   # 分支+版本号 → 生产构建
          - branch_no_version     # 分支无版本号 → 开发构建
          - tag                   # 标签选择 → 生产构建
      
      # 版本号（条件必填 - branch_with_version 时）
      version:
        description: '版本号 (e.g., pro-v1.0.0, 1.0.0)'
        required: false
        type: string
      
      # Git 标签（条件必填 - tag 时）
      git_tag:
        description: 'Git 标签 (从已有标签中选择)'
        required: false
        type: string
      
      # 构建控制（可选）
      build_deb:
        description: '构建 Debian 包'
        required: false
        type: boolean
        default: false
      
      build_docker:
        description: '构建 Docker 镜像'
        required: false
        type: boolean
        default: false
      
      # Docker 镜像类型（可选）
      docker_image_type:
        description: 'Docker 镜像类型'
        required: false
        type: choice
        options:
          - both                 # 基础版本 + 拓展版本
          - base                # 仅基础版本
          - extended            # 仅拓展版本
        default: both

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  GHCR_IMAGE: ghcr.io/changsongyang/rustdesk-pro-server
  DOCKERHUB_IMAGE: ycstech/rustdesk-pro-server
  LATEST_TAG: latest

jobs:
  # ================================================================================
  # P1 - 构建准备
  # ================================================================================
  # 功能: 统一版本号管理和部署条件判断
  # 输入: github.ref, inputs.version
  # 输出: git_tag, should_deploy, build_id
  # 执行条件: 始终执行
  # 依赖: 无
  # ================================================================================
  pre-build:
    name: P1 - Pre-Build
    runs-on: ubuntu-22.04
    outputs:
      build_id: ${{ steps.build-id.outputs.build_id }}
      git_tag: ${{ steps.vars.outputs.git_tag }}
      deb_version: ${{ steps.vars.outputs.deb_version }}
      build_type: ${{ steps.build-type.outputs.build_type }}
      should_deploy: ${{ steps.deploy-check.outputs.should_deploy }}
      should_build_deb: ${{ steps.artifact-control.outputs.should_build_deb }}
      should_build_base_image: ${{ steps.artifact-control.outputs.should_build_base_image }}
      should_build_extended_image: ${{ steps.artifact-control.outputs.should_build_extended_image }}
    
    steps:
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      # 生成唯一构建ID: 时间戳-Git短SHA
      - name: Generate - Build ID
        id: build-id
        run: |
          BUILD_ID=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      # 提取版本信息: 从tag/手动输入/dev分支获取git_tag和deb_version
      - name: Extract - Version Information
        id: vars
        run: |
          # =============================================
          # 优先级1: 从 Git Tag 提取（自动触发 - push tag）
          # =============================================
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            T=${GITHUB_REF#refs/tags/}
            echo "[INFO] Tag push detected: $T"
          
          # =============================================
          # 优先级2: 从手动输入 version 提取（手动触发 branch_with_version）
          # =============================================
          elif [[ "${{ inputs.trigger_type }}" == "branch_with_version" ]] && [[ -n "${{ inputs.version }}" ]]; then
            T="${{ inputs.version }}"
            echo "[INFO] Manual trigger with version: $T"
          
          # =============================================
          # 优先级3: 从手动选择 git_tag 提取（手动触发 tag）
          # =============================================
          elif [[ "${{ inputs.trigger_type }}" == "tag" ]] && [[ -n "${{ inputs.git_tag }}" ]]; then
            T="${{ inputs.git_tag }}"
            echo "[INFO] Manual tag trigger: $T"
          
          # =============================================
          # 优先级4: 开发版本号（默认）
          # =============================================
          else
            T="dev-${GITHUB_SHA::8}"
            echo "[INFO] Development version: $T"
          fi
          
          echo "git_tag=$T" >> $GITHUB_OUTPUT
          echo "GIT_TAG=$T" >> $GITHUB_ENV
          
          # 统一标准化: 移除前缀
          VERSION=${T#pro-v}
          VERSION=${VERSION#pro-}
          VERSION=${VERSION#v}
          
          # Debian 包版本必须以数字开头
          # 如果版本以非数字开头（如 dev-），转换为有效格式
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            DEBIAN_VERSION="0.0.$(date +%Y%m%d%H%M%S).${GITHUB_SHA::8}"
            echo "[INFO] Converted to valid Debian version: $DEBIAN_VERSION"
          else
            DEBIAN_VERSION="$VERSION"
          fi
          
          echo "deb_version=$DEBIAN_VERSION" >> $GITHUB_OUTPUT
          echo "DEB_VERSION=$DEBIAN_VERSION" >> $GITHUB_ENV

      # 判断构建类型: prod 或 dev
      - name: Determine - Build Type
        id: build-type
        run: |
          # 1. 确定触发类型
          # 方式A: 自动触发 - push tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TRIGGER_MODE="auto_tag"
            echo "[INFO] Trigger mode: auto_tag"
          
          # 方式B: 自动触发 - push branch
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            TRIGGER_MODE="auto_branch"
            echo "[INFO] Trigger mode: auto_branch"
          
          # 方式C: 手动触发 - workflow_dispatch
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TRIGGER_MODE="manual"
            echo "[INFO] Trigger mode: manual"
          fi
          
          # 2. 确定构建类型
          if [[ "$TRIGGER_MODE" == "auto_tag" ]]; then
            BUILD_TYPE="prod"
            echo "[INFO] Build type: $BUILD_TYPE (auto tag push)"
          
          elif [[ "$TRIGGER_MODE" == "auto_branch" ]]; then
            BUILD_TYPE="dev"
            echo "[INFO] Build type: $BUILD_TYPE (auto branch push)"
          
          elif [[ "$TRIGGER_MODE" == "manual" ]]; then
            if [[ "${{ inputs.trigger_type }}" == "branch_with_version" ]] || \
               [[ "${{ inputs.trigger_type }}" == "tag" ]]; then
              BUILD_TYPE="prod"
              echo "[INFO] Build type: $BUILD_TYPE (manual: ${{ inputs.trigger_type }})"
            else
              BUILD_TYPE="dev"
              echo "[INFO] Build type: $BUILD_TYPE (manual: ${{ inputs.trigger_type }})"
            fi
          fi
          
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV

      # 判断是否需要部署
      - name: Determine - Deployment Status
        id: deploy-check
        run: |
          if [[ "${{ env.BUILD_TYPE }}" == "prod" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "[INFO] Deployment: ENABLED (production build)"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "[INFO] Deployment: DISABLED (development build)"
          fi

      # 产物生成控制
      - name: Determine - Artifact Control
        id: artifact-control
        run: |
          # 设置 Debian 包生成标志（所有构建都生成，除非手动禁用）
          SHOULD_BUILD_DEB="${{ inputs.build_deb || 'true' }}"
          
          # 设置 Docker 镜像生成标志（所有构建都生成，除非手动禁用）
          SHOULD_BUILD_DOCKER="${{ inputs.build_docker || 'true' }}"
          
          # 设置 Docker 镜像类型标志
          if [[ "$SHOULD_BUILD_DOCKER" == "true" ]]; then
            DOCKER_IMAGE_TYPE="${{ inputs.docker_image_type || 'both' }}"
            case "$DOCKER_IMAGE_TYPE" in
              both)
                SHOULD_BUILD_BASE_IMAGE="true"
                SHOULD_BUILD_EXTENDED_IMAGE="true"
                ;;
              base)
                SHOULD_BUILD_BASE_IMAGE="true"
                SHOULD_BUILD_EXTENDED_IMAGE="false"
                ;;
              extended)
                SHOULD_BUILD_BASE_IMAGE="false"
                SHOULD_BUILD_EXTENDED_IMAGE="true"
                ;;
            esac
          else
            SHOULD_BUILD_BASE_IMAGE="false"
            SHOULD_BUILD_EXTENDED_IMAGE="false"
          fi
          
          echo "should_build_deb=$SHOULD_BUILD_DEB" >> $GITHUB_OUTPUT
          echo "should_build_base_image=$SHOULD_BUILD_BASE_IMAGE" >> $GITHUB_OUTPUT
          echo "should_build_extended_image=$SHOULD_BUILD_EXTENDED_IMAGE" >> $GITHUB_OUTPUT
          echo "[INFO] Artifact control:"
          echo "  - should_build_deb: $SHOULD_BUILD_DEB"
          echo "  - should_build_base_image: $SHOULD_BUILD_BASE_IMAGE"
          echo "  - should_build_extended_image: $SHOULD_BUILD_EXTENDED_IMAGE"
      
      - name: Display - Build Information
        run: |
          echo "=============================================="
          echo "         Build Configuration Summary          "
          echo "=============================================="
          echo "Build ID:      $BUILD_ID"
          echo "Git Tag:       $GIT_TAG"
          echo "Deb Version:   $DEB_VERSION"
          echo "Build Type:    $BUILD_TYPE"
          echo "Trigger:       ${{ github.event_name }}"
          echo "Ref:           ${{ github.ref }}"
          echo "should_deploy: ${{ steps.deploy-check.outputs.should_deploy }}"
          echo "should_build_deb: ${{ steps.artifact-control.outputs.should_build_deb }}"
          echo "should_build_base_image: ${{ steps.artifact-control.outputs.should_build_base_image }}"
          echo "should_build_extended_image: ${{ steps.artifact-control.outputs.should_build_extended_image }}"
          echo "=============================================="

  # ================================================================================
  # P2 - 代码质量检查
  # ================================================================================
  # 功能: Rust代码质量检查（Rustfmt + Clippy）
  # 输入: 无
  # 输出: status
  # 执行条件: 始终执行（与pre-build并行）
  # 依赖: 无
  # ================================================================================
  code-quality:
    name: P2 - Code Quality
    runs-on: ubuntu-22.04
    outputs:
      status: ${{ steps.quality-status.outputs.status }}
    timeout-minutes: 30
    
    steps:
      - name: Start - Code Quality Check
        run: |
          echo "=============================================="
          echo "    Starting Code Quality Check                "
          echo "=============================================="
          echo "[INFO] Code quality check started at $(date)"

      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install - Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Check - Rustfmt Formatting
        id: rustfmt-check
        run: |
          echo "[INFO] Checking code formatting with Rustfmt..."
          cargo fmt --check --manifest-path commercial/Cargo.toml
        continue-on-error: false

      - name: Check - Clippy Lints
        id: clippy-check
        run: |
          echo "[INFO] Running Clippy static analysis..."
          cargo clippy --manifest-path commercial/Cargo.toml -- -D warnings
        continue-on-error: false

      - name: Report - Quality Status
        id: quality-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "[INFO] P2 - Code Quality: PASSED"

      - name: Complete - Code Quality Check
        run: |
          echo "=============================================="
          echo "    Code Quality Check Completed Successfully   "
          echo "=============================================="
          echo "[INFO] Code quality check completed at $(date)"

  # ================================================================================
  # P3 - Linux 构建
  # ================================================================================
  # 功能: Linux多架构并行构建
  # 输入: 无
  # 输出: status
  # 执行条件: 始终执行
  # 依赖: pre-build, code-quality (两者都完成后才开始)
  # 并行: amd64, arm64v8, armv7 (最多5个并行)
  # ================================================================================
  build-linux:
    name: P3 - Build Linux (${{ matrix.job.name }})
    needs: 
      - pre-build
      - code-quality
    runs-on: ubuntu-22.04
    outputs:
      status: ${{ steps.build-status.outputs.status }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        job:
          - { name: "amd64",   target: "x86_64-unknown-linux-musl" }
          - { name: "arm64v8", target: "aarch64-unknown-linux-musl" }
          - { name: "armv7",   target: "armv7-unknown-linux-musleabihf" }
    
    steps:
      - name: Start - Build Linux (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Starting ${{ matrix.job.name }} build process"
          echo "  Target: ${{ matrix.job.target }}"
          echo "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Install - Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: ${{ matrix.job.target }}
      
      - name: Install - Cross Tool
        run: cargo install cross --version 0.2.5
        timeout-minutes: 30
      
      - name: Install - OpenSSL for musl
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
        timeout-minutes: 15
      
      - name: Cache - Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.job.target }}
      
      # 使用 cross 工具进行跨架构编译，使用 musl 静态链接
      - name: Compile - Build Binary
        run: |
          rm -f commercial/Cargo.lock
          cross build --manifest-path commercial/Cargo.toml --release --target=${{ matrix.job.target }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          OPENSSL_DIR: /usr
          OPENSSL_STATIC: 1
        timeout-minutes: 60
      
      - name: Check - License Compliance
        run: |
          echo "Checking dependencies license compliance..."
          grep -r "AGPL" commercial/Cargo.toml || echo "No AGPL license found"
        timeout-minutes: 5
      
      - name: Verify - Build Result
        run: |
          if [ ! -f commercial/target/${{ matrix.job.target }}/release/rustdesk-pro ]; then
            echo "Build failed: binary not found"
            exit 1
          fi
          echo "Build successful"
      
      - name: Report - Build Status
        id: build-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P2 - Build Linux (${{ matrix.job.name }}): PASSED"
      
      - name: Set - Binary Permissions
        run: chmod -v a+x commercial/target/${{ matrix.job.target }}/release/*
      
      - name: Upload - Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: |
            commercial/target/${{ matrix.job.target }}/release/rustdesk-pro
          if-no-files-found: error
      
      - name: Complete - Build Linux (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  ${{ matrix.job.name }} build completed successfully"
          echo "  Binary: commercial/target/${{ matrix.job.target }}/release/rustdesk-pro"
          echo "=============================================="

  # ================================================================================
  # P3 - Windows 构建
  # ================================================================================
  # 功能: Windows x86_64构建
  # 输入: 无
  # 输出: status
  # 执行条件: 始终执行
  # 依赖: pre-build, code-quality (两者都完成后才开始)
  # 并行: 与build-linux并行执行
  # ================================================================================
  build-windows:
    name: P3 - Build Windows
    needs: 
      - pre-build
      - code-quality
    runs-on: windows-2022
    outputs:
      status: ${{ steps.build-status.outputs.status }}
    
    steps:
      - name: Start - Build Windows
        run: |
          Write-Host "=============================================="
          Write-Host "  Starting Windows build process"
          Write-Host "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Install - Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: x86_64-pc-windows-msvc
      
      - name: Cache - Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64-msvc
      
      # 使用 MSVC 工具链编译 Windows x86_64 二进制文件
      - name: Compile - Build Binary
        run: cargo build --manifest-path commercial/Cargo.toml --release --target=x86_64-pc-windows-msvc
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        timeout-minutes: 60
      
      - name: Verify - Build Result
        run: |
          if (-not (Test-Path "commercial\target\x86_64-pc-windows-msvc\release\rustdesk-pro.exe")) {
            Write-Error "Build failed: binary not found"
            exit 1
          }
          Write-Host "Build successful"
      
      - name: Report - Build Status
        id: build-status
        run: |
          echo "status=success" >> $env:GITHUB_OUTPUT
          Write-Host "P2 - Build Windows: PASSED"
      
      - name: Upload - Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: binaries-windows-x86_64
          path: |
            commercial\target\x86_64-pc-windows-msvc\release\rustdesk-pro.exe
          if-no-files-found: error
      
      - name: Complete - Build Windows
        run: |
          Write-Host "=============================================="
          Write-Host "  Windows build completed successfully"
          Write-Host "=============================================="

  # ================================================================================
  # P4 - 构建汇总与验证
  # ================================================================================
  # 功能: 汇总构建结果并验证所有产物
  # 输入: build-linux.status, build-windows.status
  # 输出: build_status, all_builds_passed
  # 执行条件: 始终执行（即使上游job失败）
  # 依赖: build-linux, build-windows
  # ================================================================================
  build-summary:
    name: P4 - Build Summary
    needs: 
      - pre-build
      - build-linux
      - build-windows
    runs-on: ubuntu-22.04
    outputs:
      build_status: ${{ steps.status.outputs.build_status }}
      all_builds_passed: ${{ steps.status.outputs.all_passed }}
      has_artifacts: ${{ steps.status.outputs.has_artifacts }}
    
    steps:
      - name: Debug - Workflow Context
        run: |
          echo "=============================================="
          echo "         Build Summary Debug Information        "
          echo "=============================================="
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_EVENT_NAME: ${{ github.event_name }}"
          echo "should_deploy: ${{ needs.pre-build.outputs.should_deploy }}"
          echo "git_tag: ${{ needs.pre-build.outputs.git_tag }}"
          echo "pre-build.result: ${{ needs.pre-build.result }}"
          echo "build-linux.result: ${{ needs.build-linux.result }}"
          echo "build-windows.result: ${{ needs.build-windows.result }}"
          echo "=============================================="
      
      - name: Collect - Build Statuses
        run: |
          echo "=============================================="
          echo "        Build Pipeline Status Report          "
          echo "=============================================="
          echo "P3 - Build Linux (amd64):   ${{ needs.build-linux.outputs.status || 'unknown' }}"
          echo "P3 - Build Linux (arm64v8): ${{ needs.build-linux.outputs.status || 'unknown' }}"
          echo "P3 - Build Linux (armv7):   ${{ needs.build-linux.outputs.status || 'unknown' }}"
          echo "P3 - Build Windows:         ${{ needs.build-windows.outputs.status || 'unknown' }}"
          echo "=============================================="
      
      - name: Debug - Artifact Directory Before Download
        run: |
          echo "=============================================="
          echo "    Artifact Directory Before Download         "
          echo "=============================================="
          echo "GITHUB_WORKSPACE: ${{ github.workspace }}"
          echo "Current directory: $(pwd)"
          ls -la .
          echo "=============================================="
      
      - name: Download - All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
      
      - name: Debug - Artifact Directory After Download
        run: |
          echo "=============================================="
          echo "     Artifact Directory After Download          "
          echo "=============================================="
          find artifacts -type f 2>/dev/null || echo "No files found in artifacts"
          ls -la artifacts/ 2>/dev/null || echo "artifacts directory doesn't exist"
          echo "=============================================="
      
      - name: Validate - Build Artifacts
        id: status
        run: |
          echo "=============================================="
          echo "        Build Artifact Validation             "
          echo "=============================================="
          
          STATUS="success"
          MISSING=""
          FOUND=""
          
          # Check Linux binaries
          for arch in amd64 arm64v8 armv7; do
            if [ -f "artifacts/binaries-linux-$arch/rustdesk-pro" ]; then
              echo "[PASS] binaries-linux-$arch: Found"
              FOUND="$FOUND $arch"
            else
              echo "[WARN] binaries-linux-$arch: MISSING"
              MISSING="$MISSING $arch"
            fi
          done
          
          # Check Windows binary
          if [ -f "artifacts/binaries-windows-x86_64/rustdesk-pro.exe" ]; then
            echo "[PASS] binaries-windows-x86_64: Found"
            FOUND="$FOUND windows"
          else
            echo "[WARN] binaries-windows-x86_64: MISSING"
            MISSING="$MISSING windows"
          fi
          
          echo "----------------------------------------------"
          echo "Found artifacts: $FOUND"
          if [ "$MISSING" != "" ]; then
            echo "Missing artifacts: $MISSING"
            STATUS="partial"
          fi
          echo "Build Status: $STATUS"
          echo "=============================================="
          
          echo "build_status=$STATUS" >> $GITHUB_OUTPUT
          echo "all_passed=$([ "$STATUS" == "success" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "has_artifacts=$([ "$FOUND" != "" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
      
      - name: Warning - Partial Build
        if: steps.status.outputs.build_status == 'partial'
        run: |
          echo "=============================================="
          echo "         Partial Build Warning                "
          echo "=============================================="
          echo "Some artifacts are missing but deployment will continue"
          echo "Only available artifacts will be deployed"
          echo "=============================================="
      
      - name: Complete - Build Summary
        if: steps.status.outputs.build_status == 'success'
        run: |
          echo "=============================================="
          echo "    Build Pipeline Completed Successfully     "
          echo "=============================================="
          echo "All builds passed validation"
          echo "Ready to proceed to packaging phase"
          echo "=============================================="

  # ================================================================================
  # P5 - Debian 包构建
  # ================================================================================
  # 功能: Debian包构建（多架构并行）
  # 输入: pre-build.git_tag, pre-build.deb_version
  # 输出: status
  # 执行条件: should_build_deb == 'true' && needs.build-summary.result == 'success'
  # 依赖: pre-build, build-summary
  # 并行: amd64, arm64v8, armv7 (最多5个并行)
  # ================================================================================
  deb-package:
    name: P5 - Debian Package (${{ matrix.job.name }})
    needs: 
      - pre-build
      - build-summary
    runs-on: ubuntu-22.04
    if: ${{ needs.pre-build.outputs.should_build_deb == 'true' && needs.build-summary.outputs.has_artifacts == 'true' }}
    outputs:
      status: ${{ steps.package-status.outputs.status }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        job:
          - { name: "amd64",   debian_platform: "amd64",   crossbuild_package: "" }
          - { name: "arm64v8", debian_platform: "arm64",   crossbuild_package: "crossbuild-essential-arm64" }
          - { name: "armv7",   debian_platform: "armhf",   crossbuild_package: "crossbuild-essential-armhf" }
    
    steps:
      - name: Start - Debian Packaging (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Starting Debian package build for ${{ matrix.job.name }}"
          echo "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
      
      - name: Download - Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: binaries
      
      - name: Set - Binary Permissions
        run: chmod -v a+x binaries/*
      
      - name: Install - Build Dependencies
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -y debhelper fakeroot ${{ matrix.job.crossbuild_package }}
      
      # 使用 fakeroot 创建 Debian 包，包含二进制文件和 DEBIAN/control 元数据
      - name: Build - Debian Package
        env:
          CONTROL_FILE_CONTENT: |
            Package: rustdesk-pro-server
            Version: ${{ needs.pre-build.outputs.deb_version }}
            Section: net
            Priority: optional
            Architecture: ${{ matrix.job.debian_platform }}
            Maintainer: RustDesk Team <info@rustdesk.com>
            Description: RustDesk Pro Server - Enterprise Remote Control Solution
             RustDesk Pro Server is the commercial edition of RustDesk Server,
             providing enterprise-grade features including license management,
             user management, device management, and audit logging.
        run: |
          mkdir -p debian-package
          cp binaries/* debian-package/
          
          mkdir -p debian-package/DEBIAN
          printf '%s\n' "$CONTROL_FILE_CONTENT" > debian-package/DEBIAN/control
          
          fakeroot dpkg-deb --build debian-package rustdesk-pro-server-${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}.deb
      
      - name: Verify - Package Result
        run: |
          PACKAGE="rustdesk-pro-server-${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}.deb"
          if [ ! -f "$PACKAGE" ]; then
            echo "Package not found: $PACKAGE"
            exit 1
          fi
          echo "Package created: $PACKAGE"
      
      - name: Report - Package Status
        id: package-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P4 - Debian Package (${{ matrix.job.name }}): PASSED"
      
      - name: Upload - Package Artifact
        uses: actions/upload-artifact@v5
        with:
          name: debian-package-${{ matrix.job.name }}
          path: rustdesk-pro-server-${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}.deb
          if-no-files-found: error
      
      - name: Complete - Debian Packaging (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Debian package build completed successfully"
          echo "=============================================="

  # ================================================================================
  # P6 - GitHub Release
  # ================================================================================
  # 功能: GitHub Release发布
  # 输入: pre-build.git_tag
  # 输出: status
  # 执行条件: should_deploy == 'true' && needs.build-summary.result == 'success'
  # 依赖: pre-build, build-summary, deb-package
  # ================================================================================
  github-release:
    name: P6 - GitHub Release
    needs: 
      - pre-build
      - build-summary
      - deb-package
    runs-on: ubuntu-22.04
    if: ${{ needs.build-summary.outputs.has_artifacts == 'true' }}
    outputs:
      status: ${{ steps.release-status.outputs.status }}
    
    steps:
      - name: Download - All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
      
      - name: Install - Zip Tool
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -y zip
      
      - name: Pack - Linux Binaries
        run: |
          mkdir -p release
          for arch in amd64 arm64v8 armv7; do
            cp artifacts/binaries-linux-$arch/rustdesk-pro release/rustdesk-pro-$arch
            chmod +x release/rustdesk-pro-$arch
            zip release/rustdesk-pro-server-linux-$arch.zip release/rustdesk-pro-$arch
          done
      
      - name: Pack - Windows Binaries
        run: |
          cp artifacts/binaries-windows-x86_64/rustdesk-pro.exe release/
          zip release/rustdesk-pro-server-windows-x86_64.zip release/rustdesk-pro.exe
      
      - name: Copy - Debian Packages
        run: |
          cp artifacts/debian-package-*/rustdesk-pro-server-*.deb release/ 2>/dev/null || true
      
      - name: List - Release Assets
        run: |
          echo "=============================================="
          echo "              Release Assets                  "
          echo "=============================================="
          ls -la release/
          echo "=============================================="
      
      - name: Create - GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/*.zip
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Report - Release Status
        id: release-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P5 - GitHub Release: PASSED"
      
      - name: Complete - GitHub Release
        run: |
          echo "=============================================="
          echo "         GitHub Release created successfully   "
          echo "=============================================="

  # ================================================================================
  # P7a - Docker 基础镜像构建
  # ================================================================================
  # 功能: Docker基础镜像构建（多架构并行）
  # 输入: pre-build.git_tag
  # 输出: status
  # 执行条件: should_build_base_image == 'true' && needs.build-summary.result == 'success'
  # 依赖: pre-build, build-summary
  # 并行: amd64, arm64v8, armv7 (最多5个并行)
  # ================================================================================
  docker-build-base:
    name: P7a - Docker Base (${{ matrix.job.name }})
    needs: 
      - pre-build
      - build-summary
    if: ${{ needs.pre-build.outputs.should_build_base_image == 'true' && needs.build-summary.outputs.has_artifacts == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.docker-status.outputs.status }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        job:
          - { name: "amd64",   docker_platform: "linux/amd64" }
          - { name: "arm64v8", docker_platform: "linux/arm64" }
          - { name: "armv7",   docker_platform: "linux/arm/v7" }
    
    steps:
      - name: Debug - Check Variables
        run: |
          echo "=============================================="
          echo "         Docker Base Build Debug Information    "
          echo "=============================================="
          echo "DEBUG: should_build_base_image = '${{ needs.pre-build.outputs.should_build_base_image }}'"
          echo "DEBUG: build-summary.result = '${{ needs.build-summary.result }}'"
          echo "DEBUG: git_tag = '${{ needs.pre-build.outputs.git_tag }}'"
          echo "DEBUG: DOCKERHUB_IMAGE = '${{ env.DOCKERHUB_IMAGE }}'"
          echo "DEBUG: GHCR_IMAGE = '${{ env.GHCR_IMAGE }}'"
          echo "DEBUG: LATEST_TAG = '${{ env.LATEST_TAG }}'"
          echo "DEBUG: matrix.job.name = '${{ matrix.job.name }}'"
          echo "DEBUG: matrix.job.docker_platform = '${{ matrix.job.docker_platform }}'"
          echo "=============================================="
      
      - name: Start - Docker Base Build (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Starting Docker base build for ${{ matrix.job.name }}"
          echo "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Set - Version Variables
        run: |
          GIT_TAG="${{ needs.pre-build.outputs.git_tag || 'dev-unknown' }}"
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
          echo "DEBUG: GIT_TAG set to $GIT_TAG"
      
      - name: Validate - GIT_TAG Environment Variable
        run: |
          if [ -z "${{ env.GIT_TAG }}" ] || [ "${{ env.GIT_TAG }}" = "dev-unknown" ]; then
            echo "Error: GIT_TAG environment variable is not properly set"
            exit 1
          fi
          echo "GIT_TAG validation passed: ${{ env.GIT_TAG }}"
      
      - name: Download - Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: artifacts
      
      - name: Prepare - Docker Rootfs
        run: |
          mkdir -p commercial/docker/rootfs/usr/bin
          cp artifacts/rustdesk-pro commercial/docker/rootfs/usr/bin/
          chmod +x commercial/docker/rootfs/usr/bin/*
      
      - name: Setup - QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Setup - Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login - GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Login - Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      # 使用 docker/build-push-action 构建并推送多架构镜像到 Docker Hub 和 GHCR
      - name: Build - Docker Base Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./commercial/docker/Dockerfile.gha
          platforms: ${{ matrix.job.docker_platform }}
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-${{ matrix.job.name }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}
            ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-${{ matrix.job.name }}
            ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-${{ matrix.job.name }}
      
      - name: Verify - Docker Image Push
        run: |
          echo "Verifying Docker image push..."
          docker manifest inspect ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-${{ matrix.job.name }} || echo "Warning: Image verification failed but push may have succeeded"
          echo "Docker image push completed"
      
      - name: Scan - Docker Image Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-${{ matrix.job.name }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Upload - Trivy Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-base-${{ matrix.job.name }}
          path: 'trivy-results.sarif'
          retention-days: 30
      
      - name: Generate - SBOM
        uses: anchore/sbom-action@v0
        with:
          image: '${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-${{ matrix.job.name }}'
          format: spdx-json
          output-file: 'sbom-base-${{ matrix.job.name }}.spdx.json'
      
      - name: Upload - SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-base-${{ matrix.job.name }}
          path: 'sbom-base-${{ matrix.job.name }}.spdx.json'
          retention-days: 90
      
      - name: Install - Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Sign - Docker Image
        run: |
          cosign sign --yes ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-${{ matrix.job.name }} || echo "Image signing skipped (COSIGN_PRIVATE_KEY not configured)"
          cosign sign --yes ${{ env.GHCR_IMAGE }}:${{ env.GIT_TAG }}-${{ matrix.job.name }} || echo "Image signing skipped (COSIGN_PRIVATE_KEY not configured)"
      
      - name: Report - Docker Build Status
        id: docker-status
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "P7a - Docker Base Build (${{ matrix.job.name }}): PASSED"
      
      - name: Complete - Docker Base Build (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Docker base build completed successfully"
          echo "=============================================="

  # ================================================================================
  # P7b - Docker 拓展镜像构建
  # ================================================================================
  # 功能: Docker拓展镜像构建（多架构并行）
  # 输入: pre-build.git_tag
  # 输出: status
  # 执行条件: should_build_extended_image == 'true' && needs.build-summary.result == 'success'
  # 依赖: pre-build, build-summary
  # 并行: amd64, arm64v8, armv7 (最多5个并行)
  # ================================================================================
  docker-build-extended:
    name: P7b - Docker Extended (${{ matrix.job.name }})
    needs: 
      - pre-build
      - build-summary
    if: ${{ needs.pre-build.outputs.should_build_extended_image == 'true' && needs.build-summary.outputs.has_artifacts == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.docker-status.outputs.status }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        job:
          - { name: "amd64",   docker_platform: "linux/amd64" }
          - { name: "arm64v8", docker_platform: "linux/arm64" }
          - { name: "armv7",   docker_platform: "linux/arm/v7" }
    
    steps:
      - name: Debug - Check Variables
        run: |
          echo "=============================================="
          echo "         Docker Extended Build Debug Information"
          echo "=============================================="
          echo "DEBUG: should_build_extended_image = '${{ needs.pre-build.outputs.should_build_extended_image }}'"
          echo "DEBUG: build-summary.result = '${{ needs.build-summary.result }}'"
          echo "DEBUG: git_tag = '${{ needs.pre-build.outputs.git_tag }}'"
          echo "DEBUG: DOCKERHUB_IMAGE = '${{ env.DOCKERHUB_IMAGE }}'"
          echo "DEBUG: GHCR_IMAGE = '${{ env.GHCR_IMAGE }}'"
          echo "DEBUG: LATEST_TAG = '${{ env.LATEST_TAG }}'"
          echo "DEBUG: matrix.job.name = '${{ matrix.job.name }}'"
          echo "DEBUG: matrix.job.docker_platform = '${{ matrix.job.docker_platform }}'"
          echo "=============================================="
      
      - name: Start - Docker Extended Build (${{ matrix.job.name }})
        run: |
          echo "=============================================="
          echo "  Starting Docker extended build for ${{ matrix.job.name }}"
          echo "=============================================="
      
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Set - Version Variables
        run: |
          GIT_TAG="${{ needs.pre-build.outputs.git_tag || 'dev-unknown' }}"
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV
          echo "DEBUG: GIT_TAG set to $GIT_TAG"
      
      - name: Validate - GIT_TAG Environment Variable
        run: |
          if [ -z "${{ env.GIT_TAG }}" ] || [ "${{ env.GIT_TAG }}" = "dev-unknown" ]; then
            echo "Error: GIT_TAG environment variable is not properly set"
            exit 1
          fi
          echo "GIT_TAG validation passed: ${{ env.GIT_TAG }}"
      
      - name: Download - Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: artifacts
      
      - name: Prepare - Docker Rootfs
        run: |
          mkdir -p commercial/docker/rootfs/usr/bin
          cp artifacts/rustdesk-pro commercial/docker/rootfs/usr/bin/
          chmod +x commercial/docker/rootfs/usr/bin/*
      
      - name: Setup - QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Setup - Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login - GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Login - Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      # 使用 docker/build-push-action 构建并推送多架构镜像到 Docker Hub 和 GHCR
      # 使用 Dockerfile.extended 构建拓展镜像
      - name: Build - Docker Extended Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./commercial/docker/Dockerfile.extended
          platforms: ${{ matrix.job.docker_platform }}
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.LATEST_TAG }}-extended-${{ matrix.job.name }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-extended-${{ matrix.job.name }}
            ${{ env.GHCR_IMAGE }}:${{ env.LATEST_TAG }}-extended-${{ matrix.job.name }}
            ${{ env.GHCR_IMAGE }}:${{ needs.pre-build.outputs.git_tag }}-extended-${{ matrix.job.name }}
      
      - name: Verify - Docker Image Push
        run: |
          echo "Verifying Docker image push..."
          docker manifest inspect ${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended-${{ matrix.job.name }} || echo "Warning: Image verification failed but push may have succeeded"
          echo "Docker image push completed"
      
      - name: Scan - Docker Image Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended-${{ matrix.job.name }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Upload - Trivy Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-extended-${{ matrix.job.name }}
          path: 'trivy-results.sarif'
          retention-days: 30
      
      - name: Generate - SBOM
        uses: anchore/sbom-action@v0
        with:
          image: '${{ env.DOCKERHUB_IMAGE }}:${{ env.GIT_TAG }}-extended-${{ matrix.job.name }}'
          format: spdx-json
          output-file: 'sbom-extended-${{ matrix.job.name }}.spdx.json'
      
      - name: Upload - SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-extended-${{ matrix.job.name }}
          path: 'sbom-extended-${{ matrix.job.name }}.spdx.json'
