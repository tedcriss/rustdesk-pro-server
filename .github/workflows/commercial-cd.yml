name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          targets: x86_64-unknown-linux-musl
      
      - name: Install cross tool
        run: cargo install cross --git https://github.com/rust-embedded/cross
      
      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      
      - name: Build binary
        run: |
          rm -f commercial/Cargo.lock
          cross build --manifest-path commercial/Cargo.toml --release --target=x86_64-unknown-linux-musl
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          OPENSSL_DIR: /usr
          OPENSSL_STATIC: 1
      
      - name: Copy binary to rootfs
        run: |
          mkdir -p commercial/docker/rootfs/usr/bin
          cp commercial/target/x86_64-unknown-linux-musl/release/rustdesk-pro commercial/docker/rootfs/usr/bin/
          chmod +x commercial/docker/rootfs/usr/bin/*
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./commercial/docker/Dockerfile.gha
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          format: spdx-json
          output-file: sbom.spdx.json
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: sbom.spdx.json

  release:
    name: Create Release
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-compose:
    name: Update Docker Compose
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
      
      - name: Update image tag
        run: |
          sed -i 's|image: rustdesk-pro-server:.*|image: rustdesk-pro-server:latest|' docker-compose.yml
          sed -i 's|image: ghcr.io/.*/rustdesk-pro-server:.*|image: ghcr.io/${{ github.repository }}:latest|' docker-compose.yml
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Docker image to latest'
          title: 'chore: Update Docker image to latest'
          branch: chore/update-docker-image
          delete-branch: true
